services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal
    labels:
      - "traefik.enable=false"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CORS_ORIGINS: https://${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - internal
    labels:
      - "traefik.enable=false"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.taskmanager.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.taskmanager.entrypoints=https"
      - "traefik.http.routers.taskmanager.tls=true"
      - "traefik.http.routers.taskmanager.tls.certresolver=letsencrypt"
      - "traefik.http.services.taskmanager.loadbalancer.server.port=80"
      - 'traefik.http.middlewares.mybasicauth.basicauth.users=test:$2y$05$Hywf820036me104f.4dSv.tZcf93w9gIQ3jy8txVEuWhnJdnuUqCK'
    restart: unless-stopped

networks:
  internal:
    internal: true
  coolify:
    external: true
    name: coolify

volumes:
  postgres_data:
