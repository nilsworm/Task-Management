                <input type="date" value={newSprint.start} onChange={e=>setNewSprint(p=>({...p,start:e.target.value}))}
                  style={{background:'var(--bg)',border:'1px solid var(--border2)',borderRadius:4,padding:'5px 6px',color:'var(--text)',fontSize:10.5,fontFamily:'var(--mono)'}}/>
                <input type="date" value={newSprint.end} onChange={e=>setNewSprint(p=>({...p,end:e.target.value}))}
                  style={{background:'var(--bg)',border:'1px solid var(--border2)',borderRadius:4,padding:'5px 6px',color:'var(--text)',fontSize:10.5,fontFamily:'var(--mono)'}}/>
              </div>
              <input placeholder="Goal (optional)" value={newSprint.goal}
                onChange={e=>setNewSprint(p=>({...p,goal:e.target.value}))}
                style={{width:'100%',background:'var(--bg)',border:'1px solid var(--border2)',borderRadius:4,padding:'5px 8px',color:'var(--text)',fontSize:11,marginBottom:8}}/>
              <div style={{display:'flex',gap:6}}>
                <button onClick={createSprint} style={{flex:1,padding:'6px',background:'var(--cyan)',color:'#000',fontWeight:600,fontSize:11,borderRadius:4}}>Create</button>
                <button onClick={()=>setCreating(false)} style={{padding:'6px 10px',background:'transparent',border:'1px solid var(--border2)',color:'var(--text2)',fontSize:11,borderRadius:4}}>Cancel</button>
              </div>
            </div>
          ) : (
            <button onClick={()=>setCreating(true)} style={{
              width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:6,marginTop:6,
              padding:'8px',background:'transparent',border:'1px dashed var(--border2)',
              borderRadius:5,color:'var(--text3)',fontSize:11,fontWeight:500,transition:'all .15s',
            }}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--cyan)';e.currentTarget.style.color='var(--cyan)'}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border2)';e.currentTarget.style.color='var(--text3)'}}
            ><Icon name="plus" size={11}/>New Sprint</button>
          )}
        </div>
      </div>

      {/* Sprint detail */}
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {!selected ? (
          <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:8,color:'var(--text3)'}}>
            <Icon name="sprint" size={36}/>
            <div style={{fontSize:13}}>Select or create a sprint to get started</div>
          </div>
        ) : (
          <>
            <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',background:'var(--bg1)'}}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:14,marginBottom:14}}>
                <div style={{flex:1,minWidth:0}}>
                  {editing ? (
                    <input value={selected.name} onChange={e=>updateSelected({name:e.target.value})}
                      onBlur={()=>setEditing(false)} onKeyDown={e=>{if(e.key==='Enter')setEditing(false)}}
                      autoFocus className="edit-input" style={{fontSize:18,fontWeight:700,padding:'6px 10px'}}/>
                  ) : (
                    <div onClick={()=>setEditing(true)} style={{fontSize:18,fontWeight:700,color:'var(--text)',cursor:'pointer',lineHeight:1.2,marginBottom:6}}>{selected.name}</div>
                  )}
                  <div style={{display:'flex',alignItems:'center',gap:10,fontSize:11,fontFamily:'var(--mono)',color:'var(--text3)',flexWrap:'wrap'}}>
                    <input type="date" value={selected.start} onChange={e=>updateSelected({start:e.target.value})}
                      style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,padding:'2px 6px',color:'var(--text2)',fontSize:10.5,fontFamily:'var(--mono)'}}/>
                    <span>→</span>
                    <input type="date" value={selected.end} onChange={e=>updateSelected({end:e.target.value})}
                      style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:3,padding:'2px 6px',color:'var(--text2)',fontSize:10.5,fontFamily:'var(--mono)'}}/>
                    <span style={{
                      padding:'2px 8px',borderRadius:3,
                      color: daysLeft<0 ? '#ff4d6d' : daysLeft<=3 ? '#ffd166' : '#06d6a0',
                      background: daysLeft<0 ? 'rgba(255,77,109,.12)' : daysLeft<=3 ? 'rgba(255,209,102,.12)' : 'rgba(6,214,160,.12)',
                      border:`1px solid ${daysLeft<0?'rgba(255,77,109,.25)':daysLeft<=3?'rgba(255,209,102,.25)':'rgba(6,214,160,.25)'}`,
                    }}>{daysLeft<0?`${Math.abs(daysLeft)}d overdue`:`${daysLeft}d left`}</span>
                  </div>
                </div>
                <button onClick={()=>{if(confirm('Delete this sprint? Tasks will be unassigned.'))deleteSprint(selected.id)}} style={{
                  padding:'6px 12px',background:'transparent',border:'1px solid var(--border2)',
                  color:'var(--text3)',fontSize:11,fontWeight:500,borderRadius:4,
                }}
                onMouseEnter={e=>{e.currentTarget.style.color='#ff4d6d';e.currentTarget.style.borderColor='rgba(255,77,109,.4)';e.currentTarget.style.background='rgba(255,77,109,.08)'}}
                onMouseLeave={e=>{e.currentTarget.style.color='var(--text3)';e.currentTarget.style.borderColor='var(--border2)';e.currentTarget.style.background='transparent'}}
                >Delete Sprint</button>
              </div>

              <input value={selected.goal||''} onChange={e=>updateSelected({goal:e.target.value})}
                placeholder="Sprint goal — what does success look like?"
                style={{width:'100%',background:'transparent',border:'none',padding:'0 0 14px',color:'var(--text2)',fontSize:12,fontStyle:'italic'}}/>

              <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:10}}>
                <div style={{fontSize:44,fontFamily:'var(--mono)',fontWeight:700,
                  color: progressPct>=100 ? '#06d6a0' : 'var(--cyan)',
                  lineHeight:1, letterSpacing:-.5,
                }}>{progressPct}<span style={{fontSize:20,color:'var(--text3)',fontWeight:500}}>%</span></div>
                <div style={{flex:1}}>
                  <div style={{height:8,background:'var(--bg4)',borderRadius:4,overflow:'hidden',marginBottom:6,position:'relative'}}>
                    <div style={{
                      height:'100%',width:`${progressPct}%`,borderRadius:4,
                      background: progressPct>=100
                        ? 'linear-gradient(90deg,#06d6a0,#06d6a0cc)'
                        : 'linear-gradient(90deg,var(--cyan),rgba(0,212,255,0.8))',
                      boxShadow: progressPct>0 ? `0 0 10px ${progressPct>=100?'rgba(6,214,160,0.5)':'rgba(0,212,255,0.5)'}` : 'none',
                      transition:'width .3s ease',
                    }}/>
                  </div>
                  <div style={{display:'flex',gap:14,fontSize:11,fontFamily:'var(--mono)',color:'var(--text3)'}}>
                    <span><span style={{color:'#06d6a0',fontWeight:700}}>{doneCount}</span> / {totalCount} tasks done</span>
                    {totalEffort>0 && <span><span style={{color:'var(--cyan)',fontWeight:700}}>{doneEffort}</span> / {totalEffort} pts</span>}
                  </div>
                </div>
              </div>

              <div style={{display:'flex',gap:6,marginTop:4}}>
                {statusBreakdown.map(sb => (
                  <div key={sb.status} style={{
                    flex:1,padding:'6px 10px',background:sb.conf.bg,borderRadius:4,border:`1px solid ${sb.conf.color}22`,
                  }}>
                    <div style={{fontSize:18,fontFamily:'var(--mono)',fontWeight:700,color:sb.conf.color,lineHeight:1}}>{sb.count}</div>
                    <div style={{fontSize:9,fontWeight:600,letterSpacing:.4,textTransform:'uppercase',color:'var(--text3)',marginTop:3}}>{sb.status}</div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{flex:1,overflowY:'auto',padding:'10px 14px'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:.6,textTransform:'uppercase',color:'var(--text3)'}}>Sprint Backlog <span style={{color:'var(--text3)',fontWeight:500,marginLeft:6,fontFamily:'var(--mono)'}}>{sprintTasks.length}</span></div>
                <div style={{display:'flex',gap:6}}>
                  <button onClick={()=>setPicker(true)} style={{
                    display:'flex',alignItems:'center',gap:5,padding:'5px 10px',
                    background:'var(--bg3)',border:'1px solid var(--border2)',
                    color:'var(--text2)',fontSize:11,fontWeight:600,borderRadius:4,
                  }}><Icon name="plus" size={11}/>Assign Existing</button>
                  <button onClick={createNewTask} style={{
                    display:'flex',alignItems:'center',gap:5,padding:'5px 10px',
                    background:'rgba(0,212,255,0.1)',border:'1px solid rgba(0,212,255,0.25)',
                    color:'var(--cyan)',fontSize:11,fontWeight:600,borderRadius:4,
                  }}><Icon name="plus" size={11}/>New Task</button>
                </div>
              </div>

              {sprintTasks.length === 0 ? (
                <div style={{padding:'30px 14px',textAlign:'center',color:'var(--text3)',fontSize:12,border:'1px dashed var(--border)',borderRadius:5}}>
                  No tasks assigned. Click "Add Tasks" to assign from your backlog.
                </div>
              ) : sprintTasks.map(t => (
                t.id === newTaskId ? (
                  <div key={t.id} style={{marginBottom:6}}>
                    <TaskEditCard task={t} setTasks={setTasks} onClose={()=>setNewTaskId(null)} logs={logs}/>
                  </div>
                ) :
                <div key={t.id} style={{
                  display:'grid',gridTemplateColumns:'20px 1fr auto auto auto auto',gap:10,alignItems:'center',
                  padding:'9px 12px',marginBottom:4,borderRadius:4,
                  background:'var(--bg3)',border:'1px solid var(--border)',
                  transition:'border-color .15s',
                }}
                onMouseEnter={e=>e.currentTarget.style.borderColor='var(--border2)'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}
                >
                  <div style={{
                    width:14,height:14,borderRadius:3,
                    border:`1.5px solid ${t.status==='Done'?'#06d6a0':'var(--border2)'}`,
                    background:t.status==='Done'?'rgba(6,214,160,0.2)':'transparent',
                    display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',
                  }} onClick={()=>setTasks(prev=>prev.map(x=>x.id===t.id?{...x,status:x.status==='Done'?'In Progress':'Done'}:x))}
                  >{t.status==='Done' && <Icon name="check" size={9}/>}</div>
                  <span style={{
                    fontSize:12,fontWeight:500,
                    color:t.status==='Done'?'var(--text3)':'var(--text)',
                    textDecoration:t.status==='Done'?'line-through':'none',
                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                  }}>{t.title}</span>
                  <StatusBadge status={t.status}/>
                  <PriorityBadge priority={t.priority}/>
                  {t.effort>0 ? <span style={{fontSize:10,fontFamily:'var(--mono)',fontWeight:700,color:'var(--text2)',background:'var(--bg4)',padding:'2px 6px',borderRadius:3,minWidth:26,textAlign:'center'}}>{t.effort}pt</span> : <span/>}
                  <button onClick={()=>removeTask(t.id)} title="Remove from sprint" style={{
                    width:22,height:22,display:'flex',alignItems:'center',justifyContent:'center',
                    background:'transparent',border:'1px solid var(--border2)',borderRadius:3,color:'var(--text3)',
                  }}
                  onMouseEnter={e=>{e.currentTarget.style.color='#ff4d6d';e.currentTarget.style.borderColor='rgba(255,77,109,.4)'}}
                  onMouseLeave={e=>{e.currentTarget.style.color='var(--text3)';e.currentTarget.style.borderColor='var(--border2)'}}
                  ><Icon name="x" size={10}/></button>
                </div>
              ))}
            </div>
          </>
        )}
      </div>

      {picker && selected && (
        <div onClick={()=>setPicker(false)} style={{
          position:'fixed',inset:0,background:'var(--overlay)',backdropFilter:'blur(4px)',
          zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:24,
        }}>
          <div onClick={e=>e.stopPropagation()} style={{
            width:'100%',maxWidth:560,maxHeight:'75vh',
            background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,
            display:'flex',flexDirection:'column',overflow:'hidden',
            boxShadow:'var(--shadow-strong)',
          }}>
            <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border)',background:'var(--bg1)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>Assign Tasks to Sprint</div>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{unassigned.length} unassigned tasks</div>
              </div>
              <button onClick={()=>setPicker(false)} style={{
                width:26,height:26,display:'flex',alignItems:'center',justifyContent:'center',
                background:'transparent',border:'1px solid var(--border2)',borderRadius:4,color:'var(--text2)',
              }}><Icon name="x" size={11}/></button>
            </div>
            <div style={{flex:1,overflowY:'auto',padding:'8px'}}>
              {unassigned.length===0 ? (
                <div style={{padding:30,textAlign:'center',color:'var(--text3)',fontSize:12}}>All tasks are assigned to a sprint.</div>
              ) : unassigned.map(t => (
                <div key={t.id} onClick={()=>assignTask(t.id)} style={{
                  display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:4,marginBottom:3,
                  background:'var(--bg3)',border:'1px solid var(--border)',cursor:'pointer',transition:'all .15s',
                }}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--cyan)';e.currentTarget.style.background='rgba(0,212,255,0.05)'}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='var(--bg3)'}}
                >
                  <span style={{flex:1,fontSize:12,fontWeight:500,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</span>
                  <StatusBadge status={t.status}/>
                  <PriorityBadge priority={t.priority}/>
                  {t.effort>0 && <span style={{fontSize:10,fontFamily:'var(--mono)',fontWeight:700,color:'var(--text2)',background:'var(--bg4)',padding:'2px 6px',borderRadius:3}}>{t.effort}pt</span>}
                  <Icon name="plus" size={12}/>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ─── GOALS TAB ────────────────────────────────────────────────────────────────

const GoalsTab = ({ goals, setGoals }) => {
  const adjust = (id, delta) => {
    setGoals(prev => prev.map(g => g.id===id ? {...g, progress: Math.min(100,Math.max(0,g.progress+delta))} : g));
  };

  const getStatus = p => p===0 ? 'Not Started' : p>=100 ? 'Achieved' : 'In Progress';
  const getStatusColor = p => p===0 ? 'var(--text3)' : p>=100 ? '#06d6a0' : '#00d4ff';
  const getStatusBg = p => p===0 ? 'rgba(90,90,122,0.15)' : p>=100 ? 'rgba(6,214,160,0.12)' : 'rgba(0,212,255,0.12)';

  const weekly = goals.filter(g=>g.timeframe==='Weekly');
  const monthly = goals.filter(g=>g.timeframe==='Monthly');

  const GoalCard = ({goal}) => (
    <div style={{
      background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,
      padding:'14px 16px',transition:'border-color .15s,box-shadow .15s',
    }}
    onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--border2)';e.currentTarget.style.boxShadow='var(--shadow-hover)'}}
    onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.boxShadow='none'}}
    >
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:10,gap:10}}>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--text)',marginBottom:5,lineHeight:1.3}}>{goal.title}</div>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <LabelTag label={goal.category} color={goal.color}/>
            <span style={{
              fontSize:10,fontWeight:600,color:goal.timeframe==='Weekly'?'#ffd166':'#a78bfa',
              background:goal.timeframe==='Weekly'?'rgba(255,209,102,0.12)':'rgba(167,139,250,0.12)',
              border:`1px solid ${goal.timeframe==='Weekly'?'rgba(255,209,102,0.25)':'rgba(167,139,250,0.25)'}`,
              padding:'2px 7px',borderRadius:3,letterSpacing:.4,
            }}>{goal.timeframe.toUpperCase()}</span>
          </div>
        </div>
        <span style={{
          fontSize:10,fontWeight:600,padding:'3px 9px',borderRadius:3,flexShrink:0,
          color:getStatusColor(goal.progress),background:getStatusBg(goal.progress),
          border:`1px solid ${getStatusColor(goal.progress)}25`,
        }}>{getStatus(goal.progress)}</span>
      </div>

      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{flex:1,height:6,background:'var(--bg4)',borderRadius:3,overflow:'hidden'}}>
          <div style={{
            height:'100%',borderRadius:3,width:`${goal.progress}%`,
            background:`linear-gradient(90deg,${goal.color} 0%,${goal.color}cc 100%)`,
            boxShadow:`0 0 8px ${goal.color}60`,transition:'width .3s ease',
          }}/>
        </div>
        <span style={{fontSize:12,fontFamily:'var(--mono)',fontWeight:700,color:goal.color,minWidth:36,textAlign:'right'}}>{goal.progress}%</span>
        <div style={{display:'flex',gap:4}}>
          <button onClick={()=>adjust(goal.id,-10)} style={{
            width:24,height:24,borderRadius:4,background:'var(--bg4)',border:'1px solid var(--border2)',
            color:'var(--text2)',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',
            transition:'all .15s',
          }}
          onMouseEnter={e=>{e.currentTarget.style.background='var(--bg3)';e.currentTarget.style.borderColor='var(--border2)'}}
          onMouseLeave={e=>{e.currentTarget.style.background='var(--bg4)'}}
          >−</button>
          <button onClick={()=>adjust(goal.id,10)} style={{
            width:24,height:24,borderRadius:4,background:'var(--bg4)',border:'1px solid var(--border2)',
            color:'var(--cyan)',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',
            transition:'all .15s',
          }}
          onMouseEnter={e=>{e.currentTarget.style.background='rgba(0,212,255,0.1)'}}
          onMouseLeave={e=>{e.currentTarget.style.background='var(--bg4)'}}
          >+</button>
        </div>
      </div>
    </div>
  );

  const Section = ({title,items,accentColor}) => (
    <div>
      <div style={{
        display:'flex',alignItems:'center',gap:10,marginBottom:10,
      }}>
        <span style={{width:3,height:14,background:accentColor,borderRadius:2}}/>
        <span style={{fontSize:11,fontWeight:700,letterSpacing:.7,textTransform:'uppercase',color:'var(--text2)'}}>{title}</span>
        <span style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--text3)',marginLeft:4}}>{items.length}</span>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {items.map(g=><GoalCard key={g.id} goal={g}/>)}
      </div>
    </div>
  );

  return (
    <div style={{height:'100%',overflowY:'auto',padding:'2px 0'}}>
      <div style={{display:'flex',flexDirection:'column',gap:24}}>
        <Section title="Weekly Goals" items={weekly} accentColor="#ffd166"/>
        <Section title="Monthly Goals" items={monthly} accentColor="#a78bfa"/>
      </div>
    </div>
  );
};

// ─── APP ─────────────────────────────────────────────────────────────────────

const TABS = [
  { id:'board',    label:'Board',    icon:'board' },
  { id:'tasks',    label:'Tasks',    icon:'tasks' },
  { id:'sprints',  label:'Sprints',  icon:'sprint' },
  { id:'log',      label:'Daily Log',icon:'log' },
  { id:'analytics',label:'Analytics',icon:'analytics' },
  { id:'goals',    label:'Goals',    icon:'goals' },
];

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "accentColor": "#00d4ff",
  "bgColor": "#0a0f0a",
  "fontScale": 1.15,
  "compactCards": false
}/*EDITMODE-END*/;

function App() {
  const [tab, setTab] = useState(() => localStorage.getItem('pd_tab')||'board');
  const [tasks, setTasks] = useState(() => {
    try { return JSON.parse(localStorage.getItem('pd_tasks'))||INITIAL_TASKS; } catch{ return INITIAL_TASKS; }
  });
  const [goals, setGoals] = useState(() => {
    try { return JSON.parse(localStorage.getItem('pd_goals'))||INITIAL_GOALS; } catch{ return INITIAL_GOALS; }
  });
  const [logs, setLogs] = useState(() => {
    try { return JSON.parse(localStorage.getItem('pd_logs'))||INITIAL_LOG_ENTRIES; } catch{ return INITIAL_LOG_ENTRIES; }
  });
  const [sprints, setSprints] = useState(() => {
    try { return JSON.parse(localStorage.getItem('pd_sprints'))||INITIAL_SPRINTS; } catch{ return INITIAL_SPRINTS; }
  });

  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);

  useEffect(()=>{ localStorage.setItem('pd_tab',tab); },[tab]);
  useEffect(()=>{ localStorage.setItem('pd_tasks',JSON.stringify(tasks)); },[tasks]);
  useEffect(()=>{ localStorage.setItem('pd_goals',JSON.stringify(goals)); },[goals]);
  useEffect(()=>{ localStorage.setItem('pd_logs',JSON.stringify(logs)); },[logs]);
  useEffect(()=>{ localStorage.setItem('pd_sprints',JSON.stringify(sprints)); },[sprints]);

  // Tweaks host bridge
  useEffect(()=>{
    const handler = e => {
      if(e.data?.type==='__activate_edit_mode') setShowTweaks(true);
      if(e.data?.type==='__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message',handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',handler);
  },[]);

  // Cross-tab navigation from @mentions
  useEffect(()=>{
    const onOpenTask = e => {
      setTab('tasks');
      setTimeout(()=>window.dispatchEvent(new CustomEvent('pd:open-task-expand',{detail:{id:e.detail.id}})), 60);
    };
    const onOpenLog = e => {
      setTab('log');
      setTimeout(()=>window.dispatchEvent(new CustomEvent('pd:open-log-entry',{detail:{date:e.detail.date}})), 60);
    };
    window.addEventListener('pd:open-task', onOpenTask);
    window.addEventListener('pd:open-log', onOpenLog);
    return ()=>{
      window.removeEventListener('pd:open-task', onOpenTask);
      window.removeEventListener('pd:open-log', onOpenLog);
    };
  },[]);

  const setTweak = (key,val) => {
    setTweaks(p=>({...p,[key]:val}));
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[key]:val}},'*');
  };

  // Apply tweaks
  useEffect(()=>{
    document.documentElement.setAttribute('data-theme', tweaks.theme||'dark');
    document.documentElement.style.setProperty('--cyan',tweaks.accentColor);
    document.documentElement.style.setProperty('--cyan-dim',tweaks.accentColor+'26');
    if((tweaks.theme||'dark')==='dark'){
      document.documentElement.style.setProperty('--bg',tweaks.bgColor);
    } else {
      document.documentElement.style.removeProperty('--bg');
    }
    document.documentElement.style.fontSize = `${tweaks.fontScale*100}%`;
  },[tweaks]);

  const doneTasks = tasks.filter(t=>t.status==='Done').length;
  const inProgressTasks = tasks.filter(t=>t.status==='In Progress').length;

  return (
    <div style={{
      height:'100vh',display:'flex',flexDirection:'column',
      background:'var(--bg)',fontFamily:'var(--sans)',
      backgroundImage:'var(--bg-radial)',
    }}>
      {/* Top nav */}
      <div style={{
        height:48,flexShrink:0,borderBottom:'1px solid var(--border)',
        background:'var(--bg1)',display:'flex',alignItems:'center',
        padding:'0 16px',gap:2,position:'relative',zIndex:10,
        backdropFilter:'blur(8px)',
      }}>
        {/* Logo */}
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:16}}>
          <div style={{
            width:24,height:24,borderRadius:5,
            background:'linear-gradient(135deg,var(--cyan),rgba(0,212,255,0.4))',
            display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:'0 0 12px rgba(0,212,255,0.3)',
          }}>
            <span style={{fontSize:11,fontWeight:800,color:'#000',fontFamily:'var(--mono)'}}>PD</span>
          </div>
          <span style={{fontSize:12,fontWeight:700,color:'var(--text)',letterSpacing:.3}}>devflow</span>
        </div>

        {/* Tabs */}
        {TABS.map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            display:'flex',alignItems:'center',gap:6,padding:'6px 12px',
            background: tab===t.id ? 'rgba(0,212,255,0.1)' : 'transparent',
            color: tab===t.id ? 'var(--cyan)' : 'var(--text2)',
            borderRadius:5,fontSize:12,fontWeight:tab===t.id?600:400,
            border: tab===t.id ? '1px solid rgba(0,212,255,0.2)' : '1px solid transparent',
            transition:'all .15s',height:32,
          }}
          onMouseEnter={e=>{if(tab!==t.id){e.currentTarget.style.background='var(--bg3)';e.currentTarget.style.color='var(--text)'}}}
          onMouseLeave={e=>{if(tab!==t.id){e.currentTarget.style.background='transparent';e.currentTarget.style.color='var(--text2)'}}}
          >
            <span style={{opacity:.8}}><Icon name={t.icon} size={13}/></span>
            {t.label}
          </button>
        ))}

        {/* Right stats */}
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:12}}>
          <button onClick={()=>setTweak('theme',(tweaks.theme||'dark')==='dark'?'light':'dark')} style={{
            width:28,height:28,display:'flex',alignItems:'center',justifyContent:'center',
            background:'var(--bg3)',border:'1px solid var(--border)',color:'var(--text2)',
            borderRadius:5,transition:'all .15s',
          }}
          title={(tweaks.theme||'dark')==='dark'?'Switch to light mode':'Switch to dark mode'}
          onMouseEnter={e=>{e.currentTarget.style.color='var(--cyan)';e.currentTarget.style.borderColor='var(--cyan)'}}
          onMouseLeave={e=>{e.currentTarget.style.color='var(--text2)';e.currentTarget.style.borderColor='var(--border)'}}
          >
            <Icon name={(tweaks.theme||'dark')==='dark'?'sun':'moon'} size={14}/>
          </button>
          <div style={{display:'flex',gap:12}}>
            <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11,fontFamily:'var(--mono)',color:'var(--text3)'}}>
              <span style={{width:6,height:6,borderRadius:'50%',background:'#00d4ff'}}/>
              <span style={{color:'var(--text2)'}}>{inProgressTasks} in progress</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11,fontFamily:'var(--mono)',color:'var(--text3)'}}>
              <span style={{width:6,height:6,borderRadius:'50%',background:'#06d6a0'}}/>
              <span style={{color:'var(--text2)'}}>{doneTasks} done</span>
            </div>
          </div>
          <div style={{width:1,height:18,background:'var(--border)'}}/>
          <div style={{
            fontSize:11,fontFamily:'var(--mono)',color:'var(--text3)',
            background:'var(--bg3)',border:'1px solid var(--border)',
            borderRadius:4,padding:'3px 8px',
          }}>
            {new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
          </div>
        </div>
      </div>

      {/* Main content */}
      <div style={{flex:1,overflow:'hidden',padding:12}}>
        <div style={{
          height:'100%',
          opacity:1,
          transition:'opacity .15s',
        }}>
          {tab==='board'    && <BoardTab tasks={tasks} setTasks={setTasks}/>}
          {tab==='tasks'    && <TasksTab tasks={tasks} setTasks={setTasks} logs={logs}/>}
          {tab==='sprints'  && <SprintsTab sprints={sprints} setSprints={setSprints} tasks={tasks} setTasks={setTasks} logs={logs}/>}
          {tab==='log'      && <DailyLogTab logs={logs} setLogs={setLogs} tasks={tasks}/>}
          {tab==='analytics'&& <AnalyticsTab tasks={tasks} logs={logs}/>}
          {tab==='goals'    && <GoalsTab goals={goals} setGoals={setGoals}/>}
        </div>
      </div>

      {/* Tweaks panel */}
      {showTweaks && (
        <div style={{
          position:'fixed',bottom:20,right:20,zIndex:1000,
          background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,
          padding:'14px 16px',width:240,
          boxShadow:'var(--shadow-med)',
        }}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:.6,textTransform:'uppercase',color:'var(--text3)',marginBottom:12}}>Tweaks</div>
          
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:'var(--text2)',marginBottom:6}}>Theme</div>
            <div style={{display:'flex',gap:6,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:5,padding:3}}>
              {[{k:'dark',l:'Dark',i:'moon'},{k:'light',l:'Light',i:'sun'}].map(o=>(
                <button key={o.k} onClick={()=>setTweak('theme',o.k)} style={{
                  flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6,
                  padding:'6px 8px',borderRadius:3,fontSize:11,fontWeight:600,
                  background: (tweaks.theme||'dark')===o.k ? 'var(--cyan-dim)' : 'transparent',
                  color: (tweaks.theme||'dark')===o.k ? 'var(--cyan)' : 'var(--text2)',
                  border:'1px solid '+((tweaks.theme||'dark')===o.k ? 'var(--cyan)' : 'transparent'),
                  transition:'all .15s',
                }}>
                  <Icon name={o.i} size={12}/>{o.l}
                </button>
              ))}
            </div>
          </div>
          
          <div style={{marginBottom:10}}>
            <div style={{fontSize:11,color:'var(--text2)',marginBottom:5}}>Accent Color</div>
            <div style={{display:'flex',gap:7}}>
              {['#00d4ff','#a78bfa','#06d6a0','#fb923c','#ff4d6d'].map(c=>(
                <div key={c} onClick={()=>setTweak('accentColor',c)} style={{
                  width:22,height:22,borderRadius:4,background:c,cursor:'pointer',
                  border: tweaks.accentColor===c ? '2px solid var(--text)' : '2px solid transparent',
                  boxShadow: tweaks.accentColor===c ? `0 0 8px ${c}` : 'none',
                  transition:'all .15s',
                }}/>
              ))}
            </div>
          </div>

          {(tweaks.theme||'dark')==='dark' && (
            <div style={{marginBottom:10}}>
              <div style={{fontSize:11,color:'var(--text2)',marginBottom:5}}>Background</div>
              <div style={{display:'flex',gap:7}}>
                {['#0a0a0f','#0d0d0d','#070710','#0a0f0a','#0f0a0a'].map(c=>(
                  <div key={c} onClick={()=>setTweak('bgColor',c)} style={{
                    width:22,height:22,borderRadius:4,background:c,cursor:'pointer',
                    border: tweaks.bgColor===c ? '2px solid var(--text3)' : '2px solid var(--border)',
                    transition:'all .15s',
                  }}/>
                ))}
              </div>
            </div>
          )}

          <div>
            <div style={{fontSize:11,color:'var(--text2)',marginBottom:5}}>Font Scale: <span style={{fontFamily:'var(--mono)',color:'var(--cyan)'}}>{tweaks.fontScale}×</span></div>
            <input type="range" min=".85" max="1.15" step=".05" value={tweaks.fontScale}
              onChange={e=>setTweak('fontScale',parseFloat(e.target.value))}
              style={{width:'100%',accentColor:'var(--cyan)'}}
            />
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
