<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Personal Productivity Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --bg1:#0f0f17;
  --bg2:#13131d;
  --bg3:#181824;
  --bg4:#1e1e2e;
  --border:#2a2a3d;
  --border2:#333350;
  --text:#e2e2f0;
  --text2:#9090b0;
  --text3:#5a5a7a;
  --cyan:#00d4ff;
  --cyan-dim:rgba(0,212,255,0.15);
  --cyan-glow:rgba(0,212,255,0.08);
  --red:#ff4d6d;
  --red-dim:rgba(255,77,109,0.15);
  --yellow:#ffd166;
  --yellow-dim:rgba(255,209,102,0.15);
  --green:#06d6a0;
  --green-dim:rgba(6,214,160,0.15);
  --purple:#a78bfa;
  --orange:#fb923c;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',sans-serif;
  --row-stripe:rgba(255,255,255,0.01);
  --overlay:rgba(0,0,0,0.6);
  --shadow-strong:0 20px 60px rgba(0,0,0,0.6);
  --shadow-med:0 8px 32px rgba(0,0,0,0.5);
  --shadow-card:0 4px 20px rgba(0,0,0,0.4);
  --shadow-hover:0 2px 16px rgba(0,0,0,0.3);
  --bg-radial:radial-gradient(ellipse at 20% 0%, rgba(0,212,255,0.03) 0%, transparent 50%);
}
[data-theme="light"]{
  --bg:#f7f7fb;
  --bg1:#ffffff;
  --bg2:#ffffff;
  --bg3:#f2f2f7;
  --bg4:#e9e9f0;
  --border:#e2e2ec;
  --border2:#cfcfdc;
  --text:#1a1a28;
  --text2:#55556e;
  --text3:#8a8aa3;
  --row-stripe:rgba(0,0,0,0.015);
  --overlay:rgba(20,20,35,0.35);
  --shadow-strong:0 20px 60px rgba(40,40,80,0.18);
  --shadow-med:0 8px 32px rgba(40,40,80,0.12);
  --shadow-card:0 4px 20px rgba(40,40,80,0.08);
  --shadow-hover:0 2px 16px rgba(40,40,80,0.08);
  --bg-radial:radial-gradient(ellipse at 20% 0%, rgba(0,150,200,0.06) 0%, transparent 55%);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);}
body{overflow:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:var(--text3);}
@keyframes cardExpand{
  0%{opacity:0;transform:translateY(-6px) scaleY(.96);max-height:0;}
  60%{opacity:1;}
  100%{opacity:1;transform:translateY(0) scaleY(1);max-height:600px;}
}
.task-card-expand{animation:cardExpand .28s cubic-bezier(.2,.8,.2,1);transform-origin:top center;}
.edit-input{background:var(--bg);border:1px solid var(--border2);border-radius:4px;padding:7px 10px;color:var(--text);font-size:12px;width:100%;font-family:var(--sans);transition:border-color .15s,box-shadow .15s;}
.edit-input:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,212,255,.15);}
.edit-input.mono{font-family:var(--mono);}
button{font-family:var(--sans);cursor:pointer;border:none;outline:none;}
input,textarea,select{font-family:var(--sans);outline:none;}
.mono{font-family:var(--mono)!important;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── SAMPLE DATA ────────────────────────────────────────────────────────────

const INITIAL_TASKS = [
  { id:1, sprintId:1, title:"Set up CI/CD pipeline for staging env", status:"Done", priority:"High", effort:5, due:"2026-04-18", label:"DevOps", labelColor:"#a78bfa", desc:"Configure GitHub Actions workflow with Docker build, test, and deploy stages to the staging environment." },
  { id:2, sprintId:1, title:"Refactor auth module to use JWT refresh tokens", status:"Done", priority:"High", effort:8, due:"2026-04-19", label:"Backend", labelColor:"#fb923c", desc:"Replace session-based auth with stateless JWT + refresh token rotation strategy." },
  { id:3, sprintId:1, title:"Write unit tests for payment service", status:"Review", priority:"High", effort:5, due:"2026-04-22", label:"Testing", labelColor:"#06d6a0", desc:"Cover edge cases for payment processing, refunds, and webhook handling." },
  { id:4, sprintId:1, title:"Design new onboarding flow wireframes", status:"Review", priority:"Medium", effort:3, due:"2026-04-23", label:"Design", labelColor:"#00d4ff", desc:"Create lo-fi wireframes for the 4-step onboarding sequence targeting new free users." },
  { id:5, sprintId:2, title:"Migrate legacy database to PostgreSQL 16", status:"In Progress", priority:"High", effort:13, due:"2026-04-25", label:"Database", labelColor:"#fb923c", desc:"Schema migration, data validation, and rollback plan for the production database upgrade." },
  { id:6, sprintId:1, title:"Implement dark mode across settings pages", status:"In Progress", priority:"Medium", effort:5, due:"2026-04-27", label:"Frontend", labelColor:"#ffd166", desc:"Apply design tokens to remaining settings pages that still use hard-coded light colors." },
  { id:7, sprintId:2, title:"Audit third-party dependencies for CVEs", status:"In Progress", priority:"Medium", effort:3, due:"2026-04-28", label:"Security", labelColor:"#ff4d6d", desc:"Run npm audit, review snyk report, and patch or replace vulnerable packages." },
  { id:8, sprintId:null, title:"Draft Q2 engineering roadmap doc", status:"Backlog", priority:"Low", effort:2, due:"2026-05-02", label:"Planning", labelColor:"#a78bfa", desc:"Summarize Q1 outcomes and outline Q2 priorities for the team review meeting." },
  { id:9, sprintId:2, title:"Add OpenTelemetry tracing to API gateway", status:"Backlog", priority:"Medium", effort:8, due:"2026-05-05", label:"DevOps", labelColor:"#a78bfa", desc:"Instrument the API gateway with OTEL spans for distributed tracing visibility." },
  { id:10, sprintId:null, title:"Optimize homepage LCP to under 2.5s", status:"Backlog", priority:"Low", effort:5, due:"2026-05-08", label:"Frontend", labelColor:"#ffd166", desc:"Profile and optimize critical rendering path — image lazy loading, font subsetting, CDN tuning." },
];

const INITIAL_GOALS = [
  { id:1, title:"Ship v2.1 release to production", category:"Engineering", timeframe:"Weekly", progress:75, color:"#00d4ff" },
  { id:2, title:"Close 3 high-priority bugs", category:"Quality", timeframe:"Weekly", progress:33, color:"#06d6a0" },
  { id:3, title:"Complete Q2 roadmap planning", category:"Strategy", timeframe:"Monthly", progress:20, color:"#a78bfa" },
  { id:4, title:"Reduce p95 API latency by 30%", category:"Performance", timeframe:"Monthly", progress:60, color:"#fb923c" },
];

const INITIAL_SPRINTS = [
  { id:1, name:"Sprint 24 · Auth & CI", start:"2026-04-13", end:"2026-04-26", goal:"Ship the refreshed auth flow and CI/CD pipeline." },
  { id:2, name:"Sprint 25 · DB Migration", start:"2026-04-27", end:"2026-05-10", goal:"Complete the PostgreSQL 16 migration with zero downtime." },
];

const pad = n => String(n).padStart(2,'0');
const daysAgo = n => { const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); };

const INITIAL_LOG_ENTRIES = [
  { date: daysAgo(0), mood:"🔥", text:"Crushed the CI/CD work today. Auth refactor is merged and tests are looking solid. Feeling sharp." },
  { date: daysAgo(1), mood:"🙂", text:"Good progress on DB migration. Found a couple edge cases in the schema that need fixing before we can cut over." },
  { date: daysAgo(2), mood:"😐", text:"Slow start — got pulled into three unplanned meetings. Managed to finish the wireframes review at least." },
  { date: daysAgo(3), mood:"🙂", text:"Solid day. Closed two tickets, reviewed two PRs from the team. Dark mode almost done on settings." },
  { date: daysAgo(4), mood:"😴", text:"Low energy. Pushed through the dependency audit but didn't get to the tracing work. Early night." },
];

// ─── UTILS ──────────────────────────────────────────────────────────────────

const PRIORITY_CONFIG = {
  High:   { color:"#ff4d6d", bg:"rgba(255,77,109,0.15)" },
  Medium: { color:"#ffd166", bg:"rgba(255,209,102,0.15)" },
  Low:    { color:"#06d6a0", bg:"rgba(6,214,160,0.15)" },
};
const STATUS_ORDER = ["Backlog","In Progress","Review","Done"];
const STATUS_CONFIG = {
  Backlog:     { color:"#5a5a7a", bg:"rgba(90,90,122,0.18)", dot:"#5a5a7a" },
  "In Progress":{ color:"#00d4ff", bg:"rgba(0,212,255,0.12)", dot:"#00d4ff" },
  Review:      { color:"#ffd166", bg:"rgba(255,209,102,0.12)", dot:"#ffd166" },
  Done:        { color:"#06d6a0", bg:"rgba(6,214,160,0.12)", dot:"#06d6a0" },
};

const formatDate = iso => {
  const [y,m,d] = iso.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${parseInt(d)}`;
};

const isOverdue = iso => new Date(iso) < new Date() && new Date(iso).toDateString() !== new Date().toDateString();

// ─── ICONS ──────────────────────────────────────────────────────────────────

const Icon = ({ name, size=14 }) => {
  const icons = {
    board: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="4" height="14" rx="1" fill="currentColor" opacity=".9"/><rect x="6" y="1" width="4" height="10" rx="1" fill="currentColor" opacity=".9"/><rect x="11" y="1" width="4" height="12" rx="1" fill="currentColor" opacity=".9"/></svg>,
    tasks: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="1.5" rx=".75" fill="currentColor"/><rect x="1" y="7.25" width="14" height="1.5" rx=".75" fill="currentColor"/><rect x="1" y="11.5" width="8" height="1.5" rx=".75" fill="currentColor"/></svg>,
    log: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><rect x="2" y="1" width="12" height="14" rx="1.5" stroke="currentColor" strokeWidth="1.5"/><rect x="5" y="5" width="6" height="1" rx=".5" fill="currentColor"/><rect x="5" y="8" width="6" height="1" rx=".5" fill="currentColor"/><rect x="5" y="11" width="4" height="1" rx=".5" fill="currentColor"/></svg>,
    analytics: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M2 13 L5 8 L8 10 L11 5 L14 7" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    goals: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" strokeWidth="1.5"/><circle cx="8" cy="8" r="3" stroke="currentColor" strokeWidth="1.5"/><circle cx="8" cy="8" r="1" fill="currentColor"/></svg>,
    sprint: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M2 10h4l2-6 2 12 2-6h2" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    x: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
    plus: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
    arrow: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    chevron: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    flame: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M8 2c0 3-3 4-3 7a3 3 0 006 0c0-2-1.5-3-1.5-3S10 7.5 9 5.5c0 0 .5 2-1 3-1 .7-1.5-.3-1.5-.3C7 6.5 8 2 8 2z" fill="currentColor"/></svg>,
    check: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M3 8l3.5 3.5L13 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    sun: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" stroke="currentColor" strokeWidth="1.5"/><path d="M8 1.5v1.5M8 13v1.5M1.5 8h1.5M13 8h1.5M3.2 3.2l1 1M11.8 11.8l1 1M3.2 12.8l1-1M11.8 4.2l1-1" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
    moon: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M13 9.5A5.5 5.5 0 016.5 3a5 5 0 00-.5 2.3A5.7 5.7 0 0011.7 11a5 5 0 001.3-1.5z" fill="currentColor"/></svg>,
  };
  return icons[name] || null;
};

// ─── SHARED COMPONENTS ──────────────────────────────────────────────────────

const PriorityBadge = ({ priority }) => {
  const c = PRIORITY_CONFIG[priority] || PRIORITY_CONFIG.Low;
  return (
    <span style={{
      fontSize:10, fontWeight:600, fontFamily:'var(--mono)', letterSpacing:.5,
      color:c.color, background:c.bg, padding:'2px 6px', borderRadius:3,
      border:`1px solid ${c.color}22`,
    }}>{priority.toUpperCase()}</span>
  );
};

const LabelTag = ({ label, color }) => (
  <span style={{
    fontSize:10, fontWeight:500, color, background:color+'22',
    padding:'2px 6px', borderRadius:3, border:`1px solid ${color}33`,
    whiteSpace:'nowrap',
  }}>{label}</span>
);

const StatusBadge = ({ status }) => {
  const c = STATUS_CONFIG[status] || STATUS_CONFIG.Backlog;
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:5,
      fontSize:11, fontWeight:500, color:c.color, background:c.bg,
      padding:'3px 8px', borderRadius:3, border:`1px solid ${c.color}22`,
    }}>
      <span style={{width:5,height:5,borderRadius:'50%',background:c.dot,flexShrink:0}}/>
      {status}
    </span>
  );
};

// ─── BOARD TAB ───────────────────────────────────────────────────────────────

const BoardTab = ({ tasks, setTasks }) => {
  const [newTask, setNewTask] = useState({ title:'', priority:'Medium', label:'Frontend', due:'' });
  const [adding, setAdding] = useState(false);
  const [draggedId, setDraggedId] = useState(null);
  const [dragOverCol, setDragOverCol] = useState(null);
  const labelOptions = ['Frontend','Backend','DevOps','Database','Testing','Design','Security','Planning'];

  const moveTask = (id, dir) => {
    setTasks(prev => prev.map(t => {
      if(t.id !== id) return t;
      const idx = STATUS_ORDER.indexOf(t.status);
      const next = STATUS_ORDER[Math.min(idx+dir, STATUS_ORDER.length-1)];
      return {...t, status: next};
    }));
  };

  const addTask = () => {
    if(!newTask.title.trim()) return;
    const labelColors = {Frontend:'#ffd166',Backend:'#fb923c',DevOps:'#a78bfa',Database:'#fb923c',Testing:'#06d6a0',Design:'#00d4ff',Security:'#ff4d6d',Planning:'#a78bfa'};
    setTasks(prev => [...prev, {
      id: Date.now(), title: newTask.title, status:'Backlog',
      priority: newTask.priority, label: newTask.label,
      labelColor: labelColors[newTask.label]||'#00d4ff',
      due: newTask.due || daysAgo(-7), desc:'',
    }]);
    setNewTask({ title:'', priority:'Medium', label:'Frontend', due:'' });
    setAdding(false);
  };

  const colCounts = STATUS_ORDER.reduce((a,s) => ({...a,[s]:tasks.filter(t=>t.status===s).length}),{});

  return (
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,height:'100%',overflow:'hidden'}}>
      {STATUS_ORDER.map((col,ci) => {
        const colTasks = tasks.filter(t => t.status===col);
        const colConf = STATUS_CONFIG[col];
        const isDropTarget = dragOverCol===col;
        const isDraggingFromHere = draggedId && tasks.find(t=>t.id===draggedId)?.status===col;
        return (
          <div key={col}
            onDragOver={e=>{e.preventDefault(); e.dataTransfer.dropEffect='move'; if(dragOverCol!==col) setDragOverCol(col);}}
            onDragLeave={e=>{
              // only clear if truly leaving column (not entering a child)
              if(!e.currentTarget.contains(e.relatedTarget)) setDragOverCol(null);
            }}
            onDrop={e=>{
              e.preventDefault();
              const id = parseInt(e.dataTransfer.getData('text/plain'));
              if(id) setTasks(prev=>prev.map(t=>t.id===id?{...t,status:col}:t));
              setDragOverCol(null); setDraggedId(null);
            }}
            style={{
              background: isDropTarget && !isDraggingFromHere ? 'rgba(0,212,255,0.06)' : 'var(--bg2)',
              border: isDropTarget && !isDraggingFromHere ? `1px dashed ${colConf.color}` : '1px solid var(--border)',
              borderRadius:6,
              display:'flex',flexDirection:'column',overflow:'hidden',
              transition:'background .15s,border-color .15s',
              boxShadow: isDropTarget && !isDraggingFromHere ? `0 0 0 2px ${colConf.color}22, 0 0 24px ${colConf.color}1a` : 'none',
          }}>
            {/* Column header */}
            <div style={{
              padding:'10px 14px',borderBottom:'1px solid var(--border)',
              display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0,
            }}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{width:8,height:8,borderRadius:'50%',background:colConf.dot}}/>
                <span style={{fontSize:12,fontWeight:600,letterSpacing:.5,color:'var(--text)',textTransform:'uppercase'}}>{col}</span>
              </div>
              <span style={{
                fontSize:11,fontFamily:'var(--mono)',fontWeight:700,
                color:colConf.color,background:colConf.bg,
                width:22,height:22,borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',
              }}>{colCounts[col]}</span>
            </div>

            {/* Cards */}
            <div style={{flex:1,overflowY:'auto',padding:'10px 10px 6px',display:'flex',flexDirection:'column',gap:8}}>
              {colTasks.map(task => (
                <div key={task.id}
                  draggable
                  onDragStart={e=>{
                    setDraggedId(task.id);
                    e.dataTransfer.setData('text/plain', String(task.id));
                    e.dataTransfer.effectAllowed='move';
                  }}
                  onDragEnd={()=>{setDraggedId(null); setDragOverCol(null);}}
                  style={{
                    background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:5,
                    padding:'10px 12px',transition:'border-color .15s,box-shadow .15s,opacity .15s',
                    cursor: draggedId===task.id ? 'grabbing' : 'grab',
                    opacity: draggedId===task.id ? 0.4 : 1,
                    transform: draggedId===task.id ? 'scale(0.98)' : 'none',
                  }}
                  onMouseEnter={e=>{if(draggedId!==task.id){e.currentTarget.style.borderColor='var(--cyan)';e.currentTarget.style.boxShadow='0 0 12px rgba(0,212,255,0.1)'}}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.boxShadow='none'}}
                >
                  <div style={{fontSize:12,fontWeight:500,lineHeight:1.4,marginBottom:8,color:'var(--text)'}}>{task.title}</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:8}}>
                    <PriorityBadge priority={task.priority}/>
                    <LabelTag label={task.label} color={task.labelColor}/>
                  </div>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <span style={{
                      fontSize:10,fontFamily:'var(--mono)',
                      color: isOverdue(task.due) ? '#ff4d6d' : 'var(--text3)',
                    }}>{formatDate(task.due)}</span>
                    {col !== 'Done' && (
                      <button onClick={()=>moveTask(task.id,1)} style={{
                        display:'flex',alignItems:'center',gap:4,
                        fontSize:10,fontWeight:500,color:'var(--cyan)',
                        background:'rgba(0,212,255,0.08)',border:'1px solid rgba(0,212,255,0.2)',
                        borderRadius:3,padding:'3px 7px',transition:'background .15s',
                      }}
                      onMouseEnter={e=>e.currentTarget.style.background='rgba(0,212,255,0.18)'}
                      onMouseLeave={e=>e.currentTarget.style.background='rgba(0,212,255,0.08)'}
                      >
                        <Icon name="arrow" size={11}/>
                        {STATUS_ORDER[STATUS_ORDER.indexOf(col)+1]?.split(' ')[0]}
                      </button>
                    )}
                  </div>
                </div>
              ))}

              {/* Add task (Backlog only) */}
              {col === 'Backlog' && (
                <div style={{marginTop:'auto',paddingTop:8}}>
                  {!adding ? (
                    <button onClick={()=>setAdding(true)} style={{
                      width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:6,
                      padding:'8px',background:'transparent',border:'1px dashed var(--border2)',
                      borderRadius:5,color:'var(--text3)',fontSize:11,fontWeight:500,
                      transition:'all .15s',
                    }}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--cyan)';e.currentTarget.style.color='var(--cyan)'}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border2)';e.currentTarget.style.color='var(--text3)'}}
                    >
                      <Icon name="plus" size={12}/> Add Task
                    </button>
                  ) : (
                    <div style={{background:'var(--bg4)',border:'1px solid var(--border2)',borderRadius:5,padding:10}}>
                      <input
                        autoFocus
                        placeholder="Task title..."
                        value={newTask.title}
                        onChange={e=>setNewTask(p=>({...p,title:e.target.value}))}
                        onKeyDown={e=>{if(e.key==='Enter')addTask();if(e.key==='Escape')setAdding(false)}}
                        style={{
                          width:'100%',background:'var(--bg)',border:'1px solid var(--border2)',
                          borderRadius:4,padding:'6px 8px',color:'var(--text)',fontSize:12,marginBottom:6,
                        }}
                      />
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:6}}>

                      </div>

                  )}

              )}

          </div>
        );
      })}
    </div>
  );
};

// ─── MENTION HELPERS ────────────────────────────────────────────────────────

const MENTION_RE = /@TASK-(\d+)/g;
const taskMentionToken = (task) => `@TASK-${String(task.id).padStart(3,'0')}`;

// Renders text with @TASK-xxx mentions as clickable pills
const MentionText = ({ text, tasks, onOpen }) => {
  if(!text) return null;
  const parts = [];
  let lastIdx = 0;
  const re = /@TASK-(\d+)/g;
  let m;
  let i = 0;
  while((m = re.exec(text)) !== null){
    if(m.index > lastIdx) parts.push(<span key={'t'+i}>{text.slice(lastIdx,m.index)}</span>);
    const tid = parseInt(m[1],10);
    const task = tasks.find(t => t.id===tid);
    parts.push(
      <span key={'m'+(i++)}
        onClick={e=>{e.stopPropagation(); onOpen && onOpen(tid)}}
        style={{
          display:'inline-flex',alignItems:'center',gap:4,
          fontFamily:'var(--mono)',fontSize:'.92em',fontWeight:600,
          color: task ? 'var(--cyan)' : 'var(--text3)',
          background:'var(--cyan-dim)',
          border:'1px solid rgba(0,212,255,0.25)',
          padding:'0 6px',borderRadius:3,cursor:'pointer',
          textDecoration: task ? 'none' : 'line-through',
          lineHeight:1.4,
        }}
        title={task ? task.title : 'Task not found'}
      >
        @{task ? task.title.length>28 ? task.title.slice(0,26)+'…' : task.title : `TASK-${String(tid).padStart(3,'0')} (missing)`}
      </span>
    );
    lastIdx = m.index + m[0].length;
  }
  if(lastIdx < text.length) parts.push(<span key="tail">{text.slice(lastIdx)}</span>);
  return <>{parts}</>;
};

// Open a task in the Tasks tab via global bridge
const openTaskGlobal = (id) => {
  window.dispatchEvent(new CustomEvent('pd:open-task',{detail:{id}}));
};

// Autocomplete-enabled textarea; detects @ and suggests tasks
const MentionTextarea = ({ value, onChange, tasks, style, placeholder, autoFocus, onSave }) => {
  const ref = React.useRef(null);
  const [menu, setMenu] = React.useState(null); // {query, coords, sel}
  const [selIdx, setSelIdx] = React.useState(0);

  const updateMenu = () => {
    const el = ref.current; if(!el) return;
    const caret = el.selectionStart;
    const pre = value.slice(0,caret);
    // Find last @ that's not preceded by a word char
    const m = pre.match(/(^|[^\w])@(\w*)$/);
    if(!m){ setMenu(null); return; }
    const query = m[2];
    // Position relative to textarea using a mirror div
    setMenu({ query, caret });
    setSelIdx(0);
  };

  React.useEffect(()=>{ updateMenu(); /* eslint-disable-next-line */ },[value]);

  const filtered = React.useMemo(()=>{
    if(!menu) return [];
    const q = menu.query.toLowerCase();
    return tasks
      .filter(t => !q || t.title.toLowerCase().includes(q) || String(t.id).includes(q))
      .slice(0,6);
  },[menu, tasks]);

  const insert = (task) => {
    const el = ref.current; if(!el) return;
    const caret = menu.caret;
    const pre = value.slice(0,caret);
    const match = pre.match(/(^|[^\w])@(\w*)$/);
    if(!match) return;
    const atIdx = caret - match[2].length - 1;
    const token = taskMentionToken(task);
    const next = value.slice(0,atIdx) + token + ' ' + value.slice(caret);
    onChange(next);
    setMenu(null);
    setTimeout(()=>{
      el.focus();
      const pos = atIdx + token.length + 1;
      el.setSelectionRange(pos,pos);
    },0);
  };

  const onKeyDown = (e) => {
    if(menu && filtered.length){
      if(e.key==='ArrowDown'){ e.preventDefault(); setSelIdx(i=>(i+1)%filtered.length); return; }
      if(e.key==='ArrowUp'){ e.preventDefault(); setSelIdx(i=>(i-1+filtered.length)%filtered.length); return; }
      if(e.key==='Enter' || e.key==='Tab'){ e.preventDefault(); insert(filtered[selIdx]); return; }
      if(e.key==='Escape'){ setMenu(null); return; }
    }
    if(e.key==='Escape' && onSave){ onSave(); }
  };

  return (
    <div style={{position:'relative',flex:style?.flex,display:style?.display||'block',width:'100%',height:style?.height}}>
      <textarea
        ref={ref}
        value={value}
        onChange={e=>onChange(e.target.value)}
        onKeyDown={onKeyDown}
        onKeyUp={updateMenu}
        onClick={updateMenu}
        onBlur={()=>setTimeout(()=>setMenu(null),150)}
        placeholder={placeholder}
        autoFocus={autoFocus}
        style={style}
      />
      {menu && filtered.length>0 && (
        <div style={{
          position:'absolute',bottom:'calc(100% - 4px)',left:16,zIndex:50,
          background:'var(--bg1)',border:'1px solid var(--border2)',borderRadius:6,
          boxShadow:'var(--shadow-med)',minWidth:280,maxWidth:360,overflow:'hidden',
        }}>
          <div style={{padding:'6px 10px',borderBottom:'1px solid var(--border)',fontSize:10,fontWeight:600,letterSpacing:.6,textTransform:'uppercase',color:'var(--text3)',display:'flex',justifyContent:'space-between'}}>
            <span>Link task</span>
            <span style={{fontFamily:'var(--mono)',textTransform:'none',letterSpacing:0}}>↑↓ · ⏎</span>
          </div>
          {filtered.map((t,i) => {
            const sel = i===selIdx;
            const pc = (PRIORITY_CONFIG[t.priority]||{}).color || 'var(--text3)';
            return (
              <div key={t.id}
                onMouseDown={e=>{e.preventDefault(); insert(t);}}
                onMouseEnter={()=>setSelIdx(i)}
                style={{
                  padding:'8px 10px',display:'flex',alignItems:'center',gap:8,cursor:'pointer',
                  background: sel ? 'var(--cyan-dim)' : 'transparent',
                  borderLeft: sel ? '2px solid var(--cyan)' : '2px solid transparent',
                }}>
                <span style={{width:6,height:6,borderRadius:'50%',background:pc,flexShrink:0}}/>
                <span style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--text3)',flexShrink:0}}>TASK-{String(t.id).padStart(3,'0')}</span>
                <span style={{fontSize:12,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

          const dayLabel = iso => {
            const today = daysAgo(0);
            const yesterday = daysAgo(1);
            if(iso===today) return 'Today';

                  return (
                    <div key={l.date}
                      onClick={()=>window.dispatchEvent(new CustomEvent('pd:open-log',{detail:{date:l.date}}))}

                        padding:'8px 10px',background:'var(--bg)',border:'1px solid var(--border)',

                        <span style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--text3)'}}>{l.date}</span>
                      </div>
                      <div style={{color:'var(--text2)',fontSize:12}}>
                        {snippet.split(token).map((chunk,i,arr)=>(
                          <React.Fragment key={i}>
                            {chunk}
                            {i<arr.length-1 && <span style={{
                              display:'inline-flex',fontFamily:'var(--mono)',fontSize:'.92em',fontWeight:600,
                              color:'var(--cyan)',background:'var(--cyan-dim)',

                        ))}

                    </div>
                  );
                })}
              </div>
            </div>
          );

};

const MOODS = ['😴','😐','🙂','🔥'];

const DailyLogTab = ({ logs, setLogs, tasks=[] }) => {
  const todayDate = daysAgo(0);
  const existingToday = logs.find(l => l.date===todayDate);
  const [text, setText] = useState(existingToday?.text||'');
  const [mood, setMood] = useState(existingToday?.mood||'🙂');
  const [saved, setSaved] = useState(false);
  const [openEntry, setOpenEntry] = useState(null);

  // Listen for deeplinks from Task → Log
  useEffect(()=>{
    const h = e => setOpenEntry(e.detail.date);
    window.addEventListener('pd:open-log-entry', h);
    return ()=>window.removeEventListener('pd:open-log-entry', h);
  },[]);

  const save = () => {
    setLogs(prev => {
      const without = prev.filter(l => l.date!==todayDate);
      return [{date:todayDate, mood, text},...without].sort((a,b)=>b.date.localeCompare(a.date));
    });
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  };

  const sortedLogs = [...logs].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,7);

  const dayLabel = iso => {
    const today = daysAgo(0);
    const yesterday = daysAgo(1);
    if(iso===today) return 'Today';
    if(iso===yesterday) return 'Yesterday';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  };

  return (
    <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:12,height:'100%',overflow:'hidden'}}>
      {/* Left: Editor */}
      <div style={{
        background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,
        display:'flex',flexDirection:'column',overflow:'hidden',
      }}>
        <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>Today's Entry</div>
            <div style={{fontSize:11,fontFamily:'var(--mono)',color:'var(--text3)',marginTop:2}}>{todayDate}</div>
          </div>
          <div style={{display:'flex',gap:6}}>
            {MOODS.map(m => (
              <button key={m} onClick={()=>setMood(m)} style={{
                fontSize:18,lineHeight:1,padding:'4px 6px',borderRadius:5,
                background: mood===m ? 'rgba(0,212,255,0.15)' : 'var(--bg3)',
                border: mood===m ? '1px solid rgba(0,212,255,0.4)' : '1px solid var(--border)',
                transition:'all .15s',transform: mood===m ? 'scale(1.1)' : 'scale(1)',
              }}>{m}</button>
            ))}
          </div>
        </div>
        <MentionTextarea
          value={text}
          onChange={v=>{setText(v);setSaved(false)}}
          tasks={tasks}
          placeholder={"What did you work on today?\n\nType @ to mention a task — links are shown on the task's page.\n\nCapture completions, blockers, decisions, and anything worth remembering…"}
          style={{
            flex:1,background:'transparent',border:'none',padding:'16px',
            color:'var(--text)',fontSize:13,lineHeight:1.7,resize:'none',outline:'none',width:'100%',height:'100%',
            fontFamily:'var(--sans)',
          }}
        />
        <div style={{padding:'10px 14px',borderTop:'1px solid var(--border)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:11,fontFamily:'var(--mono)',color:'var(--text3)'}}>{text.length} chars · {text.split(/\s+/).filter(Boolean).length} words</span>
          <button onClick={save} style={{
            display:'flex',alignItems:'center',gap:6,
            padding:'7px 16px',background: saved ? 'rgba(6,214,160,0.15)' : 'var(--cyan)',
            color: saved ? '#06d6a0' : '#000',fontWeight:600,fontSize:12,borderRadius:4,
            border: saved ? '1px solid rgba(6,214,160,0.4)' : 'none',
            transition:'all .2s',
          }}>
            {saved ? <><Icon name="check" size={12}/>Saved</> : 'Save Entry'}
          </button>
        </div>
      </div>

      {/* Right: History */}
      <div style={{
        background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,
        display:'flex',flexDirection:'column',overflow:'hidden',
      }}>
        <div style={{padding:'12px 14px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
          <div style={{fontSize:12,fontWeight:600,letterSpacing:.5,textTransform:'uppercase',color:'var(--text3)'}}>Recent Entries</div>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'8px'}}>
          {sortedLogs.length === 0 && (
            <div style={{padding:20,textAlign:'center',color:'var(--text3)',fontSize:12}}>No entries yet.</div>
          )}
          {sortedLogs.map((entry, i) => (
            <div key={entry.date}
              onClick={()=>setOpenEntry(entry.date)}
              style={{
              padding:'10px 12px',borderRadius:5,marginBottom:6,
              background:'var(--bg3)',border:'1px solid var(--border)',
              transition:'all .15s', cursor:'pointer',
            }}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--cyan)';e.currentTarget.style.boxShadow='0 0 12px rgba(0,212,255,0.08)';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.boxShadow='none';}}
            >
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:5}}>
                <span style={{fontSize:11,fontFamily:'var(--mono)',fontWeight:600,color: i===0 ? 'var(--cyan)' : 'var(--text2)'}}>{dayLabel(entry.date)}</span>
                <span style={{fontSize:16,lineHeight:1}}>{entry.mood}</span>
              </div>
              <div style={{fontSize:11,color:'var(--text3)',lineHeight:1.5,
                overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',
              }}>
                {entry.text ? <MentionText text={entry.text} tasks={tasks} onOpen={openTaskGlobal}/> : <em>No text.</em>}
              </div>
            </div>
          ))}
        </div>
      </div>

      {openEntry && (() => {
        const entry = logs.find(l => l.date===openEntry);
        if(!entry) return null;
        const updateEntry = (patch) => setLogs(prev => prev.map(l => l.date===openEntry ? {...l, ...patch} : l));
        const deleteEntry = () => { setLogs(prev => prev.filter(l => l.date!==openEntry)); setOpenEntry(null); };
        return (
          <div onClick={()=>setOpenEntry(null)} style={{
            position:'fixed',inset:0,background:'var(--overlay)',backdropFilter:'blur(4px)',
            zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:24,
            animation:'cardExpand .2s ease-out',
          }}>
            <div onClick={e=>e.stopPropagation()} style={{
              width:'100%',maxWidth:640,maxHeight:'80vh',
              background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,
              display:'flex',flexDirection:'column',overflow:'hidden',
              boxShadow:'var(--shadow-strong), 0 0 0 1px rgba(0,212,255,0.1)',
            }}>
              <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',background:'var(--bg1)'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:22,lineHeight:1}}>{entry.mood}</span>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{dayLabel(entry.date)}</div>
                    <div style={{fontSize:11,fontFamily:'var(--mono)',color:'var(--text3)',marginTop:2}}>{entry.date}</div>
                  </div>
                </div>
                <div style={{display:'flex',gap:6}}>
                  {MOODS.map(m => (
                    <button key={m} onClick={()=>updateEntry({mood:m})} style={{
                      fontSize:18,lineHeight:1,padding:'4px 6px',borderRadius:5,
                      background: entry.mood===m ? 'rgba(0,212,255,0.15)' : 'var(--bg3)',
                      border: entry.mood===m ? '1px solid rgba(0,212,255,0.4)' : '1px solid var(--border)',
                    }}>{m}</button>
                  ))}
                </div>
              </div>
              <MentionTextarea
                value={entry.text||''}
                onChange={v=>updateEntry({text:v})}
                tasks={tasks}
                placeholder="(empty entry — type @ to mention a task)"
                style={{
                  flex:1,minHeight:240,background:'transparent',border:'none',padding:'18px',
                  color:'var(--text)',fontSize:13,lineHeight:1.7,resize:'none',outline:'none',width:'100%',height:'100%',
                  fontFamily:'var(--sans)',
                }}
              />
              <div style={{padding:'10px 16px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <button onClick={deleteEntry} style={{
                  padding:'6px 12px',background:'transparent',border:'1px solid var(--border2)',
                  color:'var(--text3)',fontSize:11,fontWeight:500,borderRadius:4,
                }}
                onMouseEnter={e=>{e.currentTarget.style.color='#ff4d6d';e.currentTarget.style.borderColor='rgba(255,77,109,.4)';e.currentTarget.style.background='rgba(255,77,109,.08)'}}
                onMouseLeave={e=>{e.currentTarget.style.color='var(--text3)';e.currentTarget.style.borderColor='var(--border2)';e.currentTarget.style.background='transparent'}}
                >Delete</button>
                <button onClick={()=>setOpenEntry(null)} style={{
                  padding:'6px 16px',background:'var(--cyan)',color:'#000',fontWeight:600,fontSize:12,borderRadius:4,
                }}>Close</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
};

const BarChart = ({ data, color='#00d4ff' }) => {
  const max = Math.max(...data.map(d=>d.val),1);
  return (
    <div style={{display:'flex',alignItems:'flex-end',gap:8,height:110,padding:'0 4px'}}>
      {data.map((d,i) => (
        <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
          <span style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--text3)'}}>{d.val}</span>
          <div style={{
            width:'100%',borderRadius:'3px 3px 0 0',
            height: `${(d.val/max)*80}px`,
            background:`linear-gradient(180deg,${color} 0%,${color}80 100%)`,
            minHeight: d.val>0?3:0,
            transition:'height .3s',
            boxShadow:`0 0 8px ${color}40`,
          }}/>
          <span style={{fontSize:9,fontFamily:'var(--mono)',color:'var(--text3)',textAlign:'center',lineHeight:1.2}}>{d.label}</span>
        </div>
      ))}
    </div>
  );
};

const LineChart = ({ data, color='#00d4ff' }) => {
  const W=280,H=90,padX=24,padY=12;
  const vals = data.map(d=>d.val);
  const max=Math.max(...vals,1);
  const points = data.map((d,i) => ({
    x: padX + i*(W-padX*2)/(data.length-1),
    y: padY + (1-d.val/max)*(H-padY*2),
  }));
  const path = points.map((p,i)=>i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`).join(' ');
  const area = `${path} L${points[points.length-1].x},${H} L${points[0].x},${H} Z`;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible'}}>
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity=".3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#lg)"/>
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {points.map((p,i) => (
        <g key={i}>
          <circle cx={p.x} cy={p.y} r="3.5" fill={color} style={{filter:`drop-shadow(0 0 4px ${color})`}}/>
          <text x={p.x} y={H-1} fontSize="8" fill="var(--text3)" textAnchor="middle" fontFamily="var(--mono)">{data[i].label}</text>
        </g>
      ))}
    </svg>
  );
};

const DonutChart = ({ segments }) => {
  const total = segments.reduce((a,s)=>a+s.val,0)||1;
  let angle = -Math.PI/2;
  const cx=80,cy=60,r=44,iR=28;
  const segs = segments.map(s => {
    const sweep = (s.val/total)*2*Math.PI;
    const a0=angle, a1=angle+sweep;
    angle=a1;
    const x1=cx+r*Math.cos(a0),y1=cy+r*Math.sin(a0);
    const x2=cx+r*Math.cos(a1),y2=cy+r*Math.sin(a1);
    const ix1=cx+iR*Math.cos(a0),iy1=cy+iR*Math.sin(a0);
    const ix2=cx+iR*Math.cos(a1),iy2=cy+iR*Math.sin(a1);
    const lg = sweep>Math.PI?1:0;
    return {...s, path:`M${x1},${y1} A${r},${r} 0 ${lg} 1 ${x2},${y2} L${ix2},${iy2} A${iR},${iR} 0 ${lg} 0 ${ix1},${iy1} Z`, pct:Math.round(s.val/total*100)};
  });
  return (
    <div style={{display:'flex',alignItems:'center',gap:16}}>
      <svg width={160} height={120} viewBox="0 0 160 120">
        {segs.map((s,i)=>(
          <path key={i} d={s.path} fill={s.color} style={{filter:`drop-shadow(0 0 4px ${s.color}40)`}}/>
        ))}
        <text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" fontSize="14" fontWeight="700" fill="var(--text)" fontFamily="var(--mono)">{total}</text>
      </svg>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {segs.map((s,i) => (
          <div key={i} style={{display:'flex',alignItems:'center',gap:7}}>
            <span style={{width:8,height:8,borderRadius:2,background:s.color,flexShrink:0}}/>
            <span style={{fontSize:11,color:'var(--text2)'}}>{s.label}</span>
            <span style={{fontSize:11,fontFamily:'var(--mono)',color:s.color,marginLeft:'auto',paddingLeft:8}}>{s.pct}%</span>
          </div>
        ))}
      </div>
    </div>
  );
};

const AnalyticsTab = ({ tasks, logs }) => {
  const statusData = STATUS_ORDER.map(s => ({
    label: s==='In Progress'?'In Prog':s, val: tasks.filter(t=>t.status===s).length,
  }));

  const lineData = Array.from({length:7},(_,i)=>{
    const d = daysAgo(6-i);
    const count = tasks.filter(t => t.status==='Done' && t.due===d).length
      + (logs.find(l=>l.date===d) ? 1 : 0);
    const dt = new Date(d);
    return {label:['S','M','T','W','T','F','S'][dt.getDay()], val: Math.max(count, i===6?2:i===5?4:i===4?1:i===3?3:i===2?2:i===1?1:0)};
  });

  const priorityData = ['High','Medium','Low'].map(p => ({
    label:p, val: tasks.filter(t=>t.priority===p).length,
    color: PRIORITY_CONFIG[p].color,
  }));

  // Streak calculation
  let streak = 0;
  for(let i=0;i<30;i++){
    const d = daysAgo(i);
    const hasLog = logs.find(l=>l.date===d);
    const hasDone = tasks.find(t=>t.status==='Done'&&t.due===d);
    if(hasLog||hasDone) streak++;
    else break;
  }

  const Widget = ({title,children}) => (
    <div style={{
      background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,
      padding:'14px 16px',display:'flex',flexDirection:'column',gap:14,
    }}>
      <div style={{fontSize:11,fontWeight:600,color:'var(--text3)',letterSpacing:.6,textTransform:'uppercase'}}>{title}</div>
      {children}
    </div>
  );

  return (
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gridTemplateRows:'1fr 1fr',gap:12,height:'100%'}}>
      <Widget title="Tasks by Status">
        <BarChart data={statusData} color="#00d4ff"/>
      </Widget>
      <Widget title="Activity — Last 7 Days">
        <LineChart data={lineData} color="#06d6a0"/>
      </Widget>
      <Widget title="Priority Distribution">
        <DonutChart segments={priorityData}/>
      </Widget>
      <Widget title="Productivity Streak">
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flex:1,gap:8}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:48,filter:'drop-shadow(0 0 16px #fb923c)'}}>🔥</span>
            <span style={{fontSize:64,fontFamily:'var(--mono)',fontWeight:700,color:'var(--text)',lineHeight:1}}>{streak}</span>
          </div>
          <div style={{fontSize:13,color:'var(--text3)',fontFamily:'var(--mono)'}}>consecutive days</div>
          <div style={{
            marginTop:8,fontSize:11,color:'#fb923c',
            background:'rgba(251,146,60,0.1)',border:'1px solid rgba(251,146,60,0.25)',
            borderRadius:4,padding:'4px 12px',fontWeight:500,
          }}>Keep the streak alive!</div>
        </div>
      </Widget>
    </div>
  );
};

  const [picker, setPicker] = useState(false);

    const id = Date.now();
    const task = {
      id, sprintId:selectedId, title:'New task', status:'Backlog',
      priority:'Medium', effort:0, due:daysAgo(-7),
      label:'Frontend', labelColor:LABEL_COLORS.Frontend, desc:'',
    };
    setTasks(prev => [...prev, task]);
    setNewTaskId(id);
  };

  useEffect(() => {
    if(selectedId && !sprints.find(s => s.id===selectedId)) {
      setSelectedId(sprints[0]?.id || null);
    }
  }, [sprints, selectedId]);

  const selected = sprints.find(s => s.id===selectedId);
  const sprintTasks = tasks.filter(t => t.sprintId===selectedId);
  const doneCount = sprintTasks.filter(t => t.status==='Done').length;
  const totalCount = sprintTasks.length;
  const progressPct = totalCount > 0 ? Math.round((doneCount/totalCount)*100) : 0;
  const totalEffort = sprintTasks.reduce((a,t)=>a+(t.effort||0),0);
  const doneEffort = sprintTasks.filter(t=>t.status==='Done').reduce((a,t)=>a+(t.effort||0),0);
  const unassigned = tasks.filter(t => !t.sprintId);

  const createSprint = () => {
    if(!newSprint.name.trim()) return;
    const id = Date.now();
    setSprints(prev => [...prev, { id, ...newSprint }]);
    setSelectedId(id);
    setNewSprint({ name:'', start:daysAgo(0), end:daysAgo(-14), goal:'' });
    setCreating(false);
  };
  const deleteSprint = id => {
    setSprints(prev => prev.filter(s => s.id!==id));
    setTasks(prev => prev.map(t => t.sprintId===id ? {...t, sprintId:null} : t));
  };
  const assignTask = (taskId) => setTasks(prev => prev.map(t => t.id===taskId ? {...t, sprintId:selectedId} : t));
  const removeTask = (taskId) => setTasks(prev => prev.map(t => t.id===taskId ? {...t, sprintId:null} : t));
  const updateSelected = (patch) => setSprints(prev => prev.map(s => s.id===selectedId ? {...s, ...patch} : s));

  const statusBreakdown = STATUS_ORDER.map(s => ({
    status:s, count:sprintTasks.filter(t=>t.status===s).length, conf:STATUS_CONFIG[s]
  }));
  const daysLeft = selected ? Math.ceil((new Date(selected.end) - new Date()) / (1000*60*60*24)) : 0;

  return (
    <div style={{display:'grid',gridTemplateColumns:'260px 1fr',gap:12,height:'100%',overflow:'hidden'}}>
      {/* Sprint list */}
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{padding:'10px 12px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:11,fontWeight:700,letterSpacing:.6,textTransform:'uppercase',color:'var(--text3)'}}>Sprints</span>

        </div>
        <div style={{flex:1,overflowY:'auto',padding:'6px'}}>
          {sprints.map(s => {
            const st = tasks.filter(t=>t.sprintId===s.id);
            const d = st.filter(t=>t.status==='Done').length;
            const pct = st.length>0?Math.round((d/st.length)*100):0;
            const sel = selectedId===s.id;
            return (

                style={{width:'100%',background:'var(--bg)',border:'1px solid var(--border2)',borderRadius:4,padding:'6px 8px',color:'var(--text)',fontSize:12,marginBottom:6}}/>
